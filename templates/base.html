{% load static %}
<!doctype html>
<html lang="es-MX">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    {% block 'head' %}
    {% endblock %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
    <title>{% block 'titulo' %}{% endblock %}</title>
</head>
<body>
{% if user.is_authenticated %}
    <nav style="background-color: #27DB8F;" class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#" style="font-weight: bold; color: #000080; background-color: #28a745; border-radius: 5px; text-decoration: none;">"Nutri Life: Alimenta tu vida, nutre tu bienestar 🥕"</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </nav>
{% endif %}
{% block 'body' %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
